services:
  - type: web
    name: piukyflix
    runtime: node
    plan: free
    # Build runs on Render's Linux-x64 host, so the workspace's pinned binaries work.
    # --no-frozen-lockfile because package.json was updated after the lockfile (regenerate it to remove this).
    buildCommand: |
      pnpm install --no-frozen-lockfile
      PORT=3000 BASE_PATH=/ pnpm --filter @workspace/streamflix run build
      pnpm --filter @workspace/api-server run build
      pnpm --filter @workspace/db run push
      pnpm --filter @workspace/scripts run seed
    startCommand: pnpm --filter @workspace/api-server run start
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: SERVE_CLIENT
        value: "true"
      - key: BASE_PATH
        value: /
      # --- Secrets: set these in the Render dashboard (sync:false = not in git) ---
      - key: DATABASE_URL          # Neon connection string
        sync: false
      - key: CLERK_SECRET_KEY      # from your own Clerk app
        sync: false
      - key: CLERK_PUBLISHABLE_KEY # from your own Clerk app
        sync: false
      - key: VITE_CLERK_PUBLISHABLE_KEY # same publishable key, baked into the frontend at build
        sync: false
      - key: REPLIT_DOMAINS        # your Render host, e.g. piukyflix.onrender.com (CORS allowlist + email links)
        sync: false
      - key: RESEND_API_KEY        # optional, for invitation emails
        sync: false
      - key: ADMIN_EMAILS          # optional, emails auto-promoted to admin
        sync: false
